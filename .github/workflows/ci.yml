name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The root package uses //go:embed all:frontend/dist, which must exist
      # for `go test ./...` to compile — a placeholder is enough for tests.
      - name: Create frontend/dist placeholder for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test ./...

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
