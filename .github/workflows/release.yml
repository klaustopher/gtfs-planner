name: Release

# Builds installable artifacts for all supported platforms on a version tag.
# Linux is built twice because webkit2gtk 4.0 (older distros) and 4.1 (Arch,
# Ubuntu 24.04+, Fedora) are not ABI-compatible and a binary is tied to one of
# them. Run via a `v*` tag to publish a (draft) release, or via the manual
# "Run workflow" button to just produce artifacts without releasing.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for artifact filenames (e.g. v1.0.0). Defaults to the ref name. Use to backfill artifacts for an existing release."
        required: false
        default: ""
      linux_only:
        description: "Build only the Linux artifacts (skip macOS/Windows)."
        type: boolean
        required: false
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  WAILS_VERSION: v2.12.0

jobs:
  # Code signing + notarization run only when the MACOS_* secrets are configured;
  # otherwise an unsigned .dmg is produced (opens via right-click → Open).
  # Required repository secrets:
  #   MACOS_CERTIFICATE_P12       base64 of the "Developer ID Application" .p12
  #   MACOS_CERTIFICATE_PASSWORD  password of that .p12
  #   MACOS_SIGNING_IDENTITY      e.g. "Developer ID Application: Name (TEAMID)"
  #   MACOS_NOTARY_KEY_P8         base64 of the App Store Connect API key (.p8)
  #   MACOS_NOTARY_KEY_ID         the API key id
  #   MACOS_NOTARY_ISSUER_ID      the API key issuer id
  macos:
    name: macOS (universal)
    runs-on: macos-latest
    if: ${{ !inputs.linux_only }}
    # Scopes the MACOS_* signing secrets to this job (and applies any protection
    # rules, e.g. a required reviewer, configured on the "release" environment).
    environment: release
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Build universal app
        run: wails build -platform darwin/universal -clean

      - name: Detect signing secrets
        id: signing
        env:
          CERT: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        run: |
          if [ -n "$CERT" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      - name: Import signing certificate
        if: steps.signing.outputs.enabled == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Sign app (hardened runtime)
        if: steps.signing.outputs.enabled == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          APP=$(ls -d build/bin/*.app | head -1)
          codesign --force --deep --timestamp --options runtime \
            --entitlements build/darwin/entitlements.plist \
            --sign "$SIGN_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Package DMG
        run: |
          APP=$(ls -d build/bin/*.app | head -1)
          DMG="gtfs-planner_${VERSION}_macOS_universal.dmg"
          hdiutil create -volname "GTFS Planner" -srcfolder "$APP" -ov -format UDZO "$DMG"

      - name: Sign, notarize and staple DMG
        if: steps.signing.outputs.enabled == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          NOTARY_KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          DMG="gtfs-planner_${VERSION}_macOS_universal.dmg"
          codesign --force --timestamp --sign "$SIGN_IDENTITY" "$DMG"
          echo "$NOTARY_KEY_P8" | base64 --decode > notary_key.p8
          # --wait exits non-zero if notarization is rejected; `xcrun notarytool
          # log <submission-id>` shows the detailed reasons.
          xcrun notarytool submit "$DMG" \
            --key notary_key.p8 --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          rm -f notary_key.p8

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: gtfs-planner_*_macOS_universal.dmg
          if-no-files-found: error

  # Native build on each arch — go-sqlite3 + WebKitGTK need cgo, so a native
  # runner is far simpler than cross-compiling. WebKitGTK 4.0 and 4.1 are not
  # ABI-compatible, hence the two variants per arch. arm64 uses GitHub's free
  # *-arm runners (public repos).
  linux:
    name: Linux (${{ matrix.arch }}, webkit2gtk ${{ matrix.webkit }})
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-22.04,     arch: amd64, webkit: "4.0", tags: "",           apt: libwebkit2gtk-4.0-dev }
          - { runner: ubuntu-22.04-arm, arch: arm64, webkit: "4.0", tags: "",           apt: libwebkit2gtk-4.0-dev }
          - { runner: ubuntu-24.04,     arch: amd64, webkit: "4.1", tags: "webkit2_41", apt: libwebkit2gtk-4.1-dev }
          - { runner: ubuntu-24.04-arm, arch: arm64, webkit: "4.1", tags: "webkit2_41", apt: libwebkit2gtk-4.1-dev }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ${{ matrix.apt }}
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Build
        run: wails build -clean ${{ matrix.tags && format('-tags {0}', matrix.tags) || '' }}
      - name: Package tarball
        run: |
          OUT="gtfs-planner_${VERSION}_linux_${{ matrix.arch }}_webkit2gtk-${{ matrix.webkit }}.tar.gz"
          chmod +x build/bin/gtfs-planner
          tar -czf "$OUT" -C build/bin gtfs-planner
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-webkit${{ matrix.webkit }}
          path: gtfs-planner_*_linux_*.tar.gz
          if-no-files-found: error

  windows:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    if: ${{ !inputs.linux_only }}
    env:
      CGO_ENABLED: "1" # go-sqlite3 needs cgo; the runner ships MinGW gcc + NSIS
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Install NSIS
        shell: bash
        run: |
          choco install nsis -y --no-progress
          echo 'C:\Program Files (x86)\NSIS' >> "$GITHUB_PATH"
      - name: Build (NSIS installer)
        run: wails build -clean -nsis
      - name: Rename installer
        shell: bash
        run: |
          INSTALLER=$(ls build/bin/*installer.exe | head -1)
          cp "$INSTALLER" "gtfs-planner_${VERSION}_windows_amd64_installer.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: gtfs-planner_*_windows_amd64_installer.exe
          if-no-files-found: error

  release:
    name: Publish release
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Print the body of the "## <version>" section, up to the next "## ".
          awk -v v="$VERSION" '$1=="##" && $2==v {f=1; next} f && $1=="##" {exit} f' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then echo "No CHANGELOG.md section for $VERSION" >&2; exit 1; fi
          echo "--- release notes ---"; cat notes.md
      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**
          draft: true
          body_path: notes.md
