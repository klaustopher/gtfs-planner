name: Release

# Builds installable artifacts for all supported platforms on a version tag.
# Linux is built twice because webkit2gtk 4.0 (older distros) and 4.1 (Arch,
# Ubuntu 24.04+, Fedora) are not ABI-compatible and a binary is tied to one of
# them. Run via a `v*` tag to publish a (draft) release, or via the manual
# "Run workflow" button to just produce artifacts without releasing.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  WAILS_VERSION: v2.12.0

jobs:
  macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Build universal app
        run: wails build -platform darwin/universal -clean
      - name: Package DMG
        run: |
          APP=$(ls -d build/bin/*.app | head -1)
          DMG="gtfs-planner_${{ github.ref_name }}_macOS_universal.dmg"
          hdiutil create -volname "GTFS Planner" -srcfolder "$APP" -ov -format UDZO "$DMG"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: gtfs-planner_*_macOS_universal.dmg
          if-no-files-found: error

  linux-webkit40:
    name: Linux (webkit2gtk 4.0)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Build
        run: wails build -clean
      - name: Package tarball
        run: |
          OUT="gtfs-planner_${{ github.ref_name }}_linux_amd64_webkit2gtk-4.0.tar.gz"
          chmod +x build/bin/gtfs-planner
          tar -czf "$OUT" -C build/bin gtfs-planner
      - uses: actions/upload-artifact@v4
        with:
          name: linux-webkit40
          path: gtfs-planner_*_linux_amd64_webkit2gtk-4.0.tar.gz
          if-no-files-found: error

  linux-webkit41:
    name: Linux (webkit2gtk 4.1)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Build (webkit2gtk 4.1)
        run: wails build -clean -tags webkit2_41
      - name: Package tarball
        run: |
          OUT="gtfs-planner_${{ github.ref_name }}_linux_amd64_webkit2gtk-4.1.tar.gz"
          chmod +x build/bin/gtfs-planner
          tar -czf "$OUT" -C build/bin gtfs-planner
      - uses: actions/upload-artifact@v4
        with:
          name: linux-webkit41
          path: gtfs-planner_*_linux_amd64_webkit2gtk-4.1.tar.gz
          if-no-files-found: error

  windows:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    env:
      CGO_ENABLED: "1" # go-sqlite3 needs cgo; the runner ships MinGW gcc + NSIS
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
      - name: Install NSIS
        shell: bash
        run: |
          choco install nsis -y --no-progress
          echo 'C:\Program Files (x86)\NSIS' >> "$GITHUB_PATH"
      - name: Build (NSIS installer)
        run: wails build -clean -nsis
      - name: Rename installer
        shell: bash
        run: |
          INSTALLER=$(ls build/bin/*installer.exe | head -1)
          cp "$INSTALLER" "gtfs-planner_${{ github.ref_name }}_windows_amd64_installer.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: gtfs-planner_*_windows_amd64_installer.exe
          if-no-files-found: error

  release:
    name: Publish release
    needs: [macos, linux-webkit40, linux-webkit41, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          draft: true
          generate_release_notes: true
