name: Update Homebrew cask

# Bumps Casks/gtfs-planner.rb whenever a release is published. The release.yml
# workflow creates a *draft* release, so we trigger on `published` (not on the
# tag push): only then is the .dmg download URL publicly reachable and the
# sha256 stable. Runs after the maintainer clicks "Publish" on the draft.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync the cask to (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update cask version and sha256
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          case "$TAG" in v*) ;; *) echo "Tag '$TAG' is not a v* release, skipping"; exit 0 ;; esac
          VERSION="${TAG#v}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/gtfs-planner_${TAG}_macOS_universal.dmg"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          sed -i -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/gtfs-planner.rb
          sed -i -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/gtfs-planner.rb

      - name: Commit and push
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/gtfs-planner.rb
          if git diff --staged --quiet; then
            echo "Cask already up to date"
          else
            git commit -m "Update Homebrew cask to ${TAG}"
            git push origin main
          fi
